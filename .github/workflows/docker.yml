# .github/workflows/docker.yml
name: Docker Build & Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase actor
        id: lc
        run: echo "ACTOR_LC=${ACTOR,,}" >> $GITHUB_ENV
        env:
          ACTOR: ${{ github.actor }}

      - name: Login to GHCR with PAT
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.ACTOR_LC }}/dasha:latest
            ghcr.io/${{ env.ACTOR_LC }}/dasha:sha-${{ github.sha }}
