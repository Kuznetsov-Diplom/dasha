name: Docker Build & Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Marsik-dev
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (personal namespace)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.actor }}/dasha:latest
            ghcr.io/${{ github.actor }}/dasha:sha-${{ github.sha }}
          # Используем личный аккаунт Marsik-dev — права есть
